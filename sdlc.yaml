# LaneSync config for kubernetes fork (release-branch demo)
# Aligned with staging DB (raguexplore-test2/kubernetes-lanesync-demo).
#
# DB required_checks: SDLC Enforce, pull-kubernetes-unit, pull-kubernetes-integration,
#   pull-kubernetes-verify, SAST Scan
# Stage split follows demo walkthrough (dev = unit; release = all three k8s jobs).
# SAST Scan is optional/non-blocking — omitted from stage gates.

version: v1
name: kubernetes-lanesync-demo

stages:
  planning:
    require_milestone: true
    require_issues_assigned: true

  development:
    branch: master
    deploy_target: dev
    required_checks:
      - "pull-kubernetes-unit"

  testing:
    branch_pattern: "release-*"
    deploy_target: staging
    required_checks:
      - "pull-kubernetes-unit"
      - "pull-kubernetes-integration"
      - "pull-kubernetes-verify"

  evidencing:
    required_artifacts:
      - sdlc-evidence
    required_reviewers:
      min_approvals: 1

  deployment:
    target: production
    promotion: manual
    requires_evidence_approval: true
